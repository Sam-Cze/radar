<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Thinking Matrix</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #05070f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 100vw;
        }

        canvas {
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(0, 255, 100, 0.1);
            display: block;
            max-width: 90vmin;
            max-height: 90vmin;
            width: 90vmin;
            height: 90vmin;
        }

        .status-box {
            position: absolute;
            bottom: 40px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .status-text {
            color: #00ff64;
            font-size: clamp(12px, 2vw, 16px);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: pulse-text 1.5s ease-in-out infinite alternate;
            text-shadow: 0 0 8px rgba(0, 255, 100, 0.6);
            white-space: nowrap;
        }

        @keyframes pulse-text {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .status-text {
                font-size: 12px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <canvas id="thinkingCanvas"></canvas>
    <div class="status-box">
        <span id="statusText" class="status-text">Initializing Neural Network...</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('thinkingCanvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const statusText = document.getElementById('statusText');

    // Responsive canvas sizing with DPI scaling
    function resizeCanvas() {
        const size = Math.min(window.innerWidth, window.innerHeight) * 0.9;
        const dpr = window.devicePixelRatio || 1;
        
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        
        ctx.scale(dpr, dpr);
        
        return size;
    }

    let WIDTH = resizeCanvas();
    let HEIGHT = WIDTH;
    let CX = WIDTH / 2;
    let CY = HEIGHT / 2;
    let RADIUS = WIDTH * 0.35;
    let FOV = WIDTH * 0.5;

    window.addEventListener('resize', () => {
        WIDTH = resizeCanvas();
        HEIGHT = WIDTH;
        CX = WIDTH / 2;
        CY = HEIGHT / 2;
        RADIUS = WIDTH * 0.35;
        FOV = WIDTH * 0.5;
    });

    // Configuration
    const DOT_COUNT = 500;
    const dots = [];
    
    // Fake tasks for the status ticker
    const tasks = [
        "Analyzing context tokens...",
        "Querying latent space...",
        "Searching vector database...",
        "Evaluating weights & biases...",
        "Synthesizing cross-attentions...",
        "Filtering hallucinations...",
        "Optimizing response structure..."
    ];
    let taskIndex = 0;

    // Pulse settings
    let pulseProgress = 0;
    const pulseSpeed = 0.015;

    // Rotation angles
    let angleX = 0;
    let angleY = 0;
    const speedX = 0.003;
    const speedY = 0.005;

    // Generate uniformly distributed points on a sphere using Fibonacci Lattice
    function generateDots() {
        dots.length = 0;
        for (let i = 0; i < DOT_COUNT; i++) {
            const phi = Math.acos(1 - 2 * (i + 0.5) / DOT_COUNT);
            const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);

            dots.push({
                x: RADIUS * Math.sin(phi) * Math.cos(theta),
                y: RADIUS * Math.sin(phi) * Math.sin(theta),
                z: RADIUS * Math.cos(phi),
                phase: Math.random() * Math.PI * 2 
            });
        }
    }

    generateDots();

    // Cycle status text
    setInterval(() => {
        taskIndex = (taskIndex + 1) % tasks.length;
        statusText.textContent = tasks[taskIndex];
    }, 3200);

    // 3D Rotation Matrix math (optimized)
    function rotateX(point, angle) {
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        const y1 = point.y * cos - point.z * sin;
        const z1 = point.z * cos + point.y * sin;
        return { x: point.x, y: y1, z: z1, phase: point.phase };
    }

    function rotateY(point, angle) {
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        const x1 = point.x * cos + point.z * sin;
        const z1 = point.z * cos - point.x * sin;
        return { x: x1, y: point.y, z: z1, phase: point.phase };
    }

    // Animation Loop with performance optimization
    let lastFrameTime = 0;
    const renderedPoints = new Array(DOT_COUNT);

    function animate(currentTime) {
        // Clear canvas with a slight trail effect (optimized)
        ctx.fillStyle = 'rgba(5, 7, 15, 0.2)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        angleX += speedX;
        angleY += speedY;
        pulseProgress += pulseSpeed;
        if (pulseProgress > 2) pulseProgress = -1;

        // Pre-calculate sine for shimmer to avoid multiple calls
        const shimmerPhase = Date.now() * 0.003;
        let pointIndex = 0;

        dots.forEach(dot => {
            // Apply 3D Rotations
            let rotated = rotateX(dot, angleX);
            rotated = rotateY(rotated, angleY);

            // 3D to 2D Perspective Projection
            const distance = WIDTH * 0.625;
            const scale = FOV / (FOV + rotated.z + distance);
            const x2d = CX + rotated.x * scale;
            const y2d = CY + rotated.y * scale;

            // Calculate distance to the current pulse wavefront
            const normalizedZ = rotated.z / RADIUS; 
            const pulseCenter = Math.sin(pulseProgress * Math.PI);
            const distanceToPulse = Math.abs(normalizedZ - pulseCenter);

            let isPulse = false;
            let brightness = 0;

            if (distanceToPulse < 0.25) {
                isPulse = true;
                brightness = Math.pow(1 - (distanceToPulse / 0.25), 2); 
            }

            renderedPoints[pointIndex] = {
                x: x2d,
                y: y2d,
                z: rotated.z,
                scale: scale,
                isPulse: isPulse,
                brightness: brightness,
                phase: dot.phase
            };
            pointIndex++;
        });

        // Sort by Z (descending)
        renderedPoints.sort((a, b) => b.z - a.z);

        // Draw the points
        for (let i = 0; i < pointIndex; i++) {
            const p = renderedPoints[i];
            
            // Base size modulated by depth + subtle ambient shimmer
            const shimmer = Math.sin(shimmerPhase + p.phase) * 0.3;
            let size = (p.scale * 2.5) + shimmer;
            
            let color;
            if (p.isPulse) {
                size += p.brightness * 4;
                // GREEN pulse wave
                color = `rgba(100, 255, 100, ${0.4 + (p.brightness * 0.6)})`;
                
                // Draw outer glow layer for pulse points - GREEN
                ctx.beginPath();
                ctx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 100, ${p.brightness * 0.15})`;
                ctx.fill();
            } else {
                // Standard dot color: green fading to dark green in the back
                const alpha = Math.max(0.15, (p.z + RADIUS) / (RADIUS * 2));
                color = `rgba(50, 200, 100, ${alpha * 0.7})`;
            }

            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.5, size), 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
        }

        // Central core atmospheric glow - GREEN
        const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, RADIUS);
        grad.addColorStop(0, 'rgba(0, 255, 100, 0.03)');
        grad.addColorStop(0.6, 'rgba(0, 150, 100, 0.01)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
