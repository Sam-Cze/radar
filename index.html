<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webowy Pomiar Prędkości Aut - Duży Ekran</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #interface-wrapper {
            width: 100%;
            max-width: 1024px; /* Zwiększony limit dla dużych ekranów */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video, canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none; /* Kliknięcia przechodzą przez canvas */
        }

        #dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 30, 30, 0.9);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-badge {
            background: #222;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #444;
            color: #00ffff;
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        input, select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        input { width: 60px; text-align: center; }
    </style>
</head>
<body>

    <div id="interface-wrapper">
        <div id="dashboard">
            <div id="status" class="status-badge">Inicjalizacja systemu...</div>
            
            <div class="controls-group">
                <label>Dystans (m): 
                    <input type="number" id="distanceInput" value="5" min="1">
                </label>
                
                <label>Kierunek ruchu: 
                    <select id="directionInput">
                        <option value="down">Z góry do dołu ↓</option>
                        <option value="up">Z dołu do góry ↑</option>
                    </select>
                </label>
            </div>
        </div>

        <div id="container">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
        </div>
    </div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusDiv = document.getElementById('status');
const distanceInput = document.getElementById('distanceInput');
const directionInput = document.getElementById('directionInput');

let model = null;
let trackedObjects = {}; 
let nextId = 0;

// Procentowe położenie linii na ekranie (zielona i czerwona)
const LINE_1_PCT = 0.35;
const LINE_2_PCT = 0.75;

async function init() {
    statusDiv.innerText = "Ładowanie modelu AI...";
    try {
        model = await cocoSsd.load();
        statusDiv.innerText = "Uruchamianie kamery...";
        
        // Na dużym ekranie prosimy o wyższą rozdzielczość (FullHD lub HD)
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        });
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
            resizeCanvas();
            statusDiv.innerText = "System gotowy. Szukam aut...";
            detectFrame();
        };
    } catch (err) {
        statusDiv.innerText = "Błąd: " + err.message;
        console.error(err);
    }
}
