<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Thinking Matrix</title>
    <style>
        body {
            margin: 0;
            background-color: #05070f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        canvas {
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(0, 231, 255, 0.05);
        }

        .status-box {
            margin-top: 20px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-text {
            color: #00e7ff;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: pulse-text 1.5s ease-in-out infinite alternate;
            text-shadow: 0 0 8px rgba(0, 231, 255, 0.5);
        }

        @keyframes pulse-text {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <canvas id="thinkingCanvas" width="800" height="800"></canvas>
    <div class="status-box">
        <span id="statusText" class="status-text">Initializing Neural Network...</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('thinkingCanvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;
    const CX = WIDTH / 2;
    const CY = HEIGHT / 2;
    const RADIUS = 280; // Orb radius
    const FOV = 400;    // Field of view for 3D projection

    // Configuration
    const DOT_COUNT = 600;
    const dots = [];
    
    // Fake tasks for the status ticker
    const tasks = [
        "Analyzing context tokens...",
        "Querying latent space...",
        "Searching vector database...",
        "Evaluating weights & biases...",
        "Synthesizing cross-attentions...",
        "Filtering hallucinations...",
        "Optimizing response structure..."
    ];
    let taskIndex = 0;

    // Pulse settings
    let pulseProgress = 0;
    const pulseSpeed = 0.015;

    // Rotation angles
    let angleX = 0;
    let angleY = 0;
    const speedX = 0.003;
    const speedY = 0.005;

    // Generate uniformly distributed points on a sphere using Fibonacci Lattice
    for (let i = 0; i < DOT_COUNT; i++) {
        const phi = Math.acos(1 - 2 * (i + 0.5) / DOT_COUNT);
        const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);

        dots.push({
            x: RADIUS * Math.sin(phi) * Math.cos(theta),
            y: RADIUS * Math.sin(phi) * Math.sin(theta),
            z: RADIUS * Math.cos(phi),
            // Unique phase offset for subtle individual ambient breathing
            phase: Math.random() * Math.PI * 2 
        });
    }

    // Cycle status text
    setInterval(() => {
        taskIndex = (taskIndex + 1) % tasks.length;
        statusText.textContent = tasks[taskIndex];
    }, 3200);

    // 3D Rotation Matrix math
    function rotateX(point, angle) {
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        const y1 = point.y * cos - point.z * sin;
        const z1 = point.z * cos + point.y * sin;
        return { x: point.x, y: y1, z: z1, phase: point.phase };
    }

    function rotateY(point, angle) {
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        const x1 = point.x * cos + point.z * sin;
        const z1 = point.z * cos - point.x * sin;
        return { x: x1, y: point.y, z: z1, phase: point.phase };
    }

    // Animation Loop
    function animate() {
        // Clear canvas with a slight trail effect
        ctx.fillStyle = 'rgba(5, 7, 15, 0.25)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        angleX += speedX;
        angleY += speedY;
        pulseProgress += pulseSpeed;
        if (pulseProgress > 2) pulseProgress = -1; // Reset pulse to come from the opposite side

        // Track points to sort them by depth (back-to-front rendering)
        const renderedPoints = [];

        dots.forEach(dot => {
            // Apply 3D Rotations
            let rotated = rotateX(dot, angleX);
            rotated = rotateY(rotated, angleY);

            // 3D to 2D Perspective Projection
            // Add distance so z is never 0 or negative
            const distance = 500; 
            const scale = FOV / (FOV + rotated.z + distance);
            const x2d = CX + rotated.x * scale;
            const y2d = CY + rotated.y * scale;

            // Calculate distance to the current pulse wavefront (moving along Z-axis)
            // Normalized z ranges from -RADIUS to +RADIUS
            const normalizedZ = rotated.z / RADIUS; 
            const pulseCenter = Math.sin(pulseProgress * Math.PI);
            const distanceToPulse = Math.abs(normalizedZ - pulseCenter);

            let isPulse = false;
            let brightness = 0;

            if (distanceToPulse < 0.25) {
                isPulse = true;
                // Sharper peak intensity
                brightness = Math.pow(1 - (distanceToPulse / 0.25), 2); 
            }

            renderedPoints.push({
                x: x2d,
                y: y2d,
                z: rotated.z,
                scale: scale,
                isPulse: isPulse,
                brightness: brightness,
                phase: rotated.phase
            });
        });

        // Sort by Z (descending) so background dots draw first, foreground dots overlay them
        renderedPoints.sort((a, b) => b.z - a.z);

        // Draw the points
        renderedPoints.forEach(p => {
            // Base size modulated by depth + subtle ambient shimmer
            const shimmer = Math.sin(Date.now() * 0.003 + p.phase) * 0.3;
            let size = (p.scale * 2.5) + shimmer;
            
            let color;
            if (p.isPulse) {
                // Bright cyan/white core for the pulse wave
                size += p.brightness * 4;
                color = `rgba(180, 255, 255, ${0.4 + (p.brightness * 0.6)})`;
                
                // Draw an extra outer glow layer for pulse points
                ctx.beginPath();
                ctx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 231, 255, ${p.brightness * 0.15})`;
                ctx.fill();
            } else {
                // Standard dot color: deep cyan fading to dark blue in the back
                const alpha = Math.max(0.15, (p.z + RADIUS) / (RADIUS * 2));
                color = `rgba(0, 180, 216, ${alpha * 0.7})`;
            }

            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.5, size), 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
        });

        // Central core atmospheric glow
        const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, RADIUS);
        grad.addColorStop(0, 'rgba(0, 231, 255, 0.03)');
        grad.addColorStop(0.6, 'rgba(0, 92, 151, 0.01)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
